════════════════════════════════════════════════════ */
function updateClock() {
  var now = new Date();
  var d = now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  var t = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
  var el = document.getElementById('live-clock');
  if(el) el.textContent = d + ' · ' + t;
}
setInterval(updateClock, 1000);
updateClock();

/* ════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════ */
function toKey(y, m) { return y + '-' + String(parseInt(m)+1).padStart(2,'0'); }
function keyYear(k) { return parseInt(k.split('-')[0]); }
function keyMonth(k) { return parseInt(k.split('-')[1])-1; }
function fmtKey(k) { return SHORT_M[keyMonth(k)] + ' ' + keyYear(k); }
function fmtKeyFull(k) { return MONTH_NAMES[keyMonth(k)] + ' ' + keyYear(k); }
function fmtDate(iso) { if(!iso) return ''; var p=iso.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function fmt(n) { return '₹' + Math.round(Math.abs(n)).toLocaleString('en-IN'); }
function pct(a,b) { return b ? Math.round(a/b*100) : 0; }
function uid() { return _nextId++; }
function today() { return new Date().toISOString().split('T')[0]; }
function nm() { return nameMe || 'Me'; }
function np() { return namePartner || 'Spouse'; }

function getMonth(key) {
  if(!monthData[key]) monthData[key] = {expenses:[], settlementPaid:[], advancePaid:[]};
  return monthData[key];
}

function calcShare(e) {
  if(e.split==='equal') return e.amount * 0.5;
  if(e.split==='me') return e.amount;
  if(e.split==='partner') return 0;
  return e.amount * (e.myShare / 100);
}

/* ════════════════════════════════════════════════════
   SETTLEMENT LOGIC (fixed carry-forward)
════════════════════════════════════════════════════ */
function computeCarryInto(targetKey) {
  var sorted = monthOrder.slice().sort();
  var carry = 0;
  for (var i = 0; i < sorted.length; i++) {
    var key = sorted[i];
    if (key >= targetKey) break;
    var m = getMonth(key);
    var exps = m.expenses;
    var mePaid = exps.filter(function(e){return e.paidBy==='me';}).reduce(function(a,e){return a+e.amount;},0);
    var myShare = exps.reduce(function(a,e){return a+calcShare(e);},0);
    var baseDues = mePaid - myShare;
    var advP = m.advancePaid.filter(function(p){return p.paidBy==='partner';}).reduce(function(a,p){return a+p.amount;},0);
    var advM = m.advancePaid.filter(function(p){return p.paidBy==='me';}).reduce(function(a,p){return a+p.amount;},0);
    var netAdv = advP - advM;
    var grossDues = baseDues - carry;
    var sP = m.settlementPaid.filter(function(p){return p.paidBy==='partner';}).reduce(function(a,p){return a+p.amount;},0);
    var sM = m.settlementPaid.filter(function(p){return p.paidBy==='me';}).reduce(function(a,p){return a+p.amount;},0);
    var netSett = sP - sM;
    carry = netAdv + netSett - grossDues;
  }
  return carry;
}

function computeFullMonth(key) {
  var m = getMonth(key);
  var exps = m.expenses;
  var total = exps.reduce(function(a,e){return a+e.amount;},0);
  var mePaid = exps.filter(function(e){return e.paidBy==='me';}).reduce(function(a,e){return a+e.amount;},0);
  var partnerPaid = total - mePaid;
  var myShare = exps.reduce(function(a,e){return a+calcShare(e);},0);
  var partnerShare = total - myShare;
  var baseDues = mePaid - myShare;
  var advP = m.advancePaid.filter(function(p){return p.paidBy==='partner';}).reduce(function(a,p){return a+p.amount;},0);
  var advM = m.advancePaid.filter(function(p){return p.paidBy==='me';}).reduce(function(a,p){return a+p.amount;},0);
  var netAdv = advP - advM;
  var carryIn = computeCarryInto(key);
  var grossDues = baseDues - carryIn;
  var sP = m.settlementPaid.filter(function(p){return p.paidBy==='partner';}).reduce(function(a,p){return a+p.amount;},0);
  var sM = m.settlementPaid.filter(function(p){return p.paidBy==='me';}).reduce(function(a,p){return a+p.amount;},0);
  var netSett = sP - sM;
  var netDue = grossDues - netAdv - netSett;
  return {total,mePaid,partnerPaid,myShare,partnerShare,baseDues,carryIn,netAdv,grossDues,netSett,netDue,advP,advM,sP,sM};
}

/* ════════════════════════════════════════════════════
   NAMES
════════════════════════════════════════════════════ */
function onNameChange() {
  nameMe = document.getElementById('name-me').value.trim() || 'Me';
  namePartner = document.getElementById('name-partner').value.trim() || 'Spouse';
  document.getElementById('av-me').textContent = nameMe.substring(0,2).toUpperCase();
  document.getElementById('av-partner').textContent = namePartner.substring(0,2).toUpperCase();
  refreshNameSelects();
  saveState();
  renderMain();
}

function refreshNameSelects() {
  ['f-paidby','sp-paidby','ap-paidby'].forEach(function(id){
    var el = document.getElementById(id);
    if(!el) return;
    if(el.options[0]) el.options[0].text = nm();
    if(el.options[1]) el.options[1].text = np();
  });
}

/* ════════════════════════════════════════════════════
   MONTH MANAGEMENT
════════════════════════════════════════════════════ */
function addMonth(year, month) {
  var key = toKey(year, month);
  if(monthOrder.indexOf(key) !== -1) { toast('⚠ This month already exists', 'error'); return; }
  getMonth(key);
  monthOrder.push(key);
  monthOrder.sort();
  activeView = key;
  saveState();
  renderSidebar();
  renderMain();
  toast('📅 ' + fmtKeyFull(key) + ' added', 'success');
}

function deleteMonth(key) {
  if(!confirm('Delete ' + fmtKeyFull(key) + ' and all its data?')) return;
  delete monthData[key];
  monthOrder = monthOrder.filter(function(k){return k!==key;});
  if(activeView === key) activeView = monthOrder.length ? monthOrder[monthOrder.length-1] : 'annual';
  saveState();
  renderSidebar();
  renderMain();
  toast('🗑 Month deleted', 'info');
}

function submitAddMonth() {
  var y = parseInt(document.getElementById('nm-year').value);
  var m = parseInt(document.getElementById('nm-month').value);
  if(!y || isNaN(m)) { toast('⚠ Please enter a valid year and month', 'error'); return; }
  closeModal('modal-month');
  addMonth(y, m);
}

/* ════════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════════ */
function renderSidebar() {
  var sorted = monthOrder.slice().sort();
  var html = '<div class="nav-section-label">Views</div>';
  html += '<button class="nav-item' + (activeView==='annual'?' active':'') + '" onclick="setView(\'annual\')">';
  html += '<span class="nav-icon">◈</span><span class="nav-month-label">Annual overview</span></button>';
  html += '<div class="nav-section-label" style="margin-top:4px;">Monthly sheets</div>';
  sorted.forEach(function(key) {
    var fm = computeFullMonth(key);
    var pillCls = Math.abs(fm.netDue) < 0.5 ? 'zero' : fm.netDue > 0 ? 'pos' : 'neg';
    var pillTxt = Math.abs(fm.netDue) < 0.5 ? '✓' : fmt(Math.abs(fm.netDue));
    html += '<button class="nav-item' + (activeView===key?' active':'') + '" onclick="setView(\'' + key + '\')">';
    html += '<span class="nav-icon">◻</span><span class="nav-month-label">' + fmtKey(key) + '</span>';
    html += '<span class="nav-pill ' + pillCls + '">' + pillTxt + '</span>';
    html += '<span class="nav-del" onclick="event.stopPropagation();deleteMonth(\'' + key + '\')" title="Delete">✕</span></button>';
  });
  html += '<button class="add-month-btn" onclick="closeMobSidebar();openMonthModal()"><span>+</span> Add month</button>';
  document.getElementById('sidebar-nav').innerHTML = html;
}

function setView(v) {
  activeView = v;
  _searchQuery = '';
  saveState();
  renderSidebar();
  renderMain();
  // Close sidebar on mobile after selecting a view
  closeMobSidebar();
}

/* ════════════════════════════════════════════════════
   CHART HELPERS
════════════════════════════════════════════════════ */
function destroyChart(id) {
  if(_charts[id]) { try{_charts[id].destroy();}catch(e){} delete _charts[id]; }
}

function makeDoughnut(canvasId, labels, data, colors) {
  var el = document.getElementById(canvasId);
  if(!el) return null;
  return new Chart(el, {
    type:'doughnut',
    data:{labels:labels, datasets:[{data:data, backgroundColor:colors, borderWidth:0, hoverOffset:4}]},
    options:{responsive:true, maintainAspectRatio:false, cutout:'72%',
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(c){
        var total = data.reduce(function(a,b){return a+b;},0);
        return ' '+fmt(c.raw)+' ('+pct(c.raw,total)+'%)';
      }}}}}
  });
}

/* ════════════════════════════════════════════════════
   MAIN RENDER ROUTER
════════════════════════════════════════════════════ */
function renderMain() {
  var main = document.getElementById('main-area');
  if(activeView === 'annual') {
    main.innerHTML = buildAnnualHTML();
    renderAnnualCharts();
  } else {
    main.innerHTML = buildMonthHTML(activeView);
    renderMonthCharts(activeView);
  }
  // Restore date fields
  ['sp-date','ap-date'].forEach(function(id){
    var el=document.getElementById(id); if(el && !el.value) el.value=today();
  });
  refreshNameSelects();
  // Restore search if any
  if(_searchQuery && activeView !== 'annual') {
    var sb = document.getElementById('main-search');
    if(sb) sb.value = _searchQuery;
  }
  // Apply swipe listeners on mobile
  addSwipeListeners();
}

/* ════════════════════════════════════════════════════
   CARD / MC HELPERS
════════════════════════════════════════════════════ */
function mc(cls, lbl, val, sub) {
  return '<div class="metric-card '+cls+'"><div class="metric-label">'+lbl+'</div><div class="metric-value">'+val+'</div><div class="metric-sub">'+sub+'</div></div>';
}
function mc2(cls, lbl, val, sub, valCls) {
  return '<div class="metric-card '+cls+'"><div class="metric-label">'+lbl+'</div><div class="metric-value '+(valCls||'')+'">'+val+'</div><div class="metric-sub">'+sub+'</div></div>';
}

/* ════════════════════════════════════════════════════
   ANNUAL OVERVIEW HTML
════════════════════════════════════════════════════ */
function buildAnnualHTML() {
  var sorted = monthOrder.slice().sort();
  var allExp = [];
  sorted.forEach(function(k){ allExp = allExp.concat((monthData[k]||{expenses:[]}).expenses); });

  var annTotal = allExp.reduce(function(a,e){return a+e.amount;},0);
  var annMePaid = allExp.filter(function(e){return e.paidBy==='me';}).reduce(function(a,e){return a+e.amount;},0);
  var annPartnerPaid = annTotal - annMePaid;

  var annNetDue = 0;
  if(sorted.length) annNetDue = computeFullMonth(sorted[sorted.length-1]).netDue;

  var netValClass = annNetDue > 0.5 ? 'pos' : annNetDue < -0.5 ? 'neg' : '';
  var netLabel = annNetDue > 0.5 ? np()+' owes you' : annNetDue < -0.5 ? 'You owe '+np() : 'All clear';

  /* ── CATEGORY × MONTH TABLE ─────────────────────────────── */
  // Collect all categories dynamically from all months
  var allCats = [];
  var catMonthSpend = {}; // catMonthSpend[cat][key] = amount
  sorted.forEach(function(k) {
    var exps = (monthData[k]||{expenses:[]}).expenses;
    exps.forEach(function(e) {
      if(!catMonthSpend[e.cat]) { catMonthSpend[e.cat] = {}; allCats.indexOf(e.cat)===-1 && allCats.push(e.cat); }
      catMonthSpend[e.cat][k] = (catMonthSpend[e.cat][k]||0) + e.amount;
    });
  });
  var totalMonths = sorted.length;
  // Sort categories by annual total descending
  allCats.sort(function(a,b){
    var ta = sorted.reduce(function(s,k){return s+(catMonthSpend[a]&&catMonthSpend[a][k]||0);},0);
    var tb = sorted.reduce(function(s,k){return s+(catMonthSpend[b]&&catMonthSpend[b][k]||0);},0);
    return tb-ta;
  });

  var catTableHTML = '';
  if(allCats.length && totalMonths > 0) {
    // Find max spend per cell for heat shading
    var allAmts = [];
    allCats.forEach(function(c){ sorted.forEach(function(k){ var v=catMonthSpend[c]&&catMonthSpend[c][k]||0; if(v>0) allAmts.push(v); }); });
    allAmts.sort(function(a,b){return a-b;});
    var heatMax = allAmts.length ? allAmts[allAmts.length-1] : 1;
    var heatMid = heatMax * 0.5;
    var heatLo  = heatMax * 0.2;
    function heatClass(v) { if(!v) return ''; if(v>=heatMid) return 'heat-3'; if(v>=heatLo) return 'heat-2'; return 'heat-1'; }

    catTableHTML += '<table class="cat-monthly-table"><thead><tr><th class="left">Category</th>';
    sorted.forEach(function(k){ catTableHTML += '<th>'+fmtKey(k)+'</th>'; });
    catTableHTML += '<th style="border-left:1px solid var(--border2);">Annual total</th><th>Monthly avg</th></tr></thead><tbody>';

    allCats.forEach(function(c) {
      catTableHTML += '<tr><td class="cat-name-cell">'+c+'</td>';
      sorted.forEach(function(k) {
        var v = catMonthSpend[c]&&catMonthSpend[c][k]||0;
        var hc = heatClass(v);
        if(v) {
          catTableHTML += '<td class="'+hc+'">'+fmt(v)+'</td>';
        } else {
          catTableHTML += '<td class="empty-cell">—</td>';
        }
      });
      var catTotal = sorted.reduce(function(s,k){return s+(catMonthSpend[c]&&catMonthSpend[c][k]||0);},0);
      var catAvg = totalMonths > 0 ? Math.round(catTotal/totalMonths) : 0;
      catTableHTML += '<td class="total-col">'+fmt(catTotal)+'</td><td class="avg-col">'+fmt(catAvg)+'</td></tr>';
    });

    // Totals row
    catTableHTML += '<tr class="total-row"><td class="cat-name-cell">Monthly total</td>';
    sorted.forEach(function(k){
      var colTotal = allCats.reduce(function(s,c){return s+(catMonthSpend[c]&&catMonthSpend[c][k]||0);},0);
      catTableHTML += '<td>'+(colTotal?fmt(colTotal):'—')+'</td>';
    });
    catTableHTML += '<td class="total-col">'+fmt(annTotal)+'</td><td class="avg-col">'+fmt(totalMonths?Math.round(annTotal/totalMonths):0)+'</td></tr>';
    catTableHTML += '</tbody></table>';
  } else {
    catTableHTML = '<div class="empty-state" style="padding:20px"><div class="big">📊</div>No data yet</div>';
  }

  /* ── TOP / BOTTOM MONTH CALLOUTS ────────────────────────── */
  var calloutsHTML = '';
  if(sorted.length >= 2) {
    var monthTotals = sorted.map(function(k){ return {key:k, total:(monthData[k]||{expenses:[]}).expenses.reduce(function(a,e){return a+e.amount;},0)}; });
    monthTotals.sort(function(a,b){return b.total-a.total;});
    var topM = monthTotals[0], botM = monthTotals[monthTotals.length-1];
    calloutsHTML = '<div class="spend-callouts">'
      + '<div class="spend-callout"><div class="callout-icon">📈</div><div class="callout-body"><div class="callout-label">Heaviest month</div><div class="callout-month">'+fmtKeyFull(topM.key)+'</div><div class="callout-amount"><span class="hi">'+fmt(topM.total)+'</span> total spend</div></div></div>'
      + '<div class="spend-callout"><div class="callout-icon">📉</div><div class="callout-body"><div class="callout-label">Lightest month</div><div class="callout-month">'+fmtKeyFull(botM.key)+'</div><div class="callout-amount"><span class="lo">'+fmt(botM.total)+'</span> total spend</div></div></div>'
      + '</div>';
  }

  /* ── MONTHLY SUMMARY CARDS ───────────────────────────────── */
  var monthCardsHTML = '';
  if(sorted.length) {
    sorted.forEach(function(key) {
      var fm = computeFullMonth(key);
      var sign = fm.netDue > 0.5 ? 'pos' : fm.netDue < -0.5 ? 'neg' : '';
      var lbl = fm.netDue > 0.5 ? np()+' owes' : fm.netDue < -0.5 ? nm()+' owes' : 'Settled ✓';
      monthCardsHTML += '<div class="annual-month-card" onclick="setView(\''+key+'\')"><div class="amc-title">'+fmtKeyFull(key)+'</div>';
      monthCardsHTML += '<div class="amc-row"><span>Total</span><span class="amc-val">'+fmt(fm.total)+'</span></div>';
      monthCardsHTML += '<div class="amc-row"><span>'+nm()+' paid</span><span class="amc-val">'+fmt(fm.mePaid)+'</span></div>';
      monthCardsHTML += '<div class="amc-row"><span>'+np()+' paid</span><span class="amc-val">'+fmt(fm.partnerPaid)+'</span></div>';
      monthCardsHTML += '<div class="amc-divider"></div>';
      monthCardsHTML += '<div class="amc-row"><span>'+lbl+'</span><span class="amc-val '+sign+'">'+fmt(Math.abs(fm.netDue))+'</span></div></div>';
    });
  } else {
    monthCardsHTML = '<div class="empty-state"><div class="big">📅</div>Add a month to get started</div>';
  }

  return '<div class="page-header"><div><h1 class="page-title">Annual <em>overview</em></h1><p class="page-subtitle">Across all tracked months</p></div>'
    + '<div class="header-actions"><button class="add-btn-main secondary" onclick="openMonthModal()">+ Add month</button></div></div>'
    + '<div class="page-content">'
    + '<div class="metrics-row">'
    + mc('c-gold','Total expenses',fmt(annTotal),allExp.length+' transactions · '+sorted.length+' months')
    + mc('c-blue',nm()+' paid',fmt(annMePaid),pct(annMePaid,annTotal)+'% of total')
    + mc('c-teal',np()+' paid',fmt(annPartnerPaid),pct(annPartnerPaid,annTotal)+'% of total')
    + mc2('c-rose','Current net balance',fmt(Math.abs(annNetDue)),netLabel,netValClass)
    + '</div>'
    + calloutsHTML
    + '<div class="full-chart-card" style="margin-bottom:14px;"><div class="chart-title">Monthly spend</div><div style="position:relative;height:220px;"><canvas id="ann-monthChart"></canvas></div><div class="legend" id="ann-month-legend"></div></div>'
    + '<div class="full-chart-card" style="margin-bottom:14px;"><div class="chart-title">Running balance — who owes whom over time</div><div style="position:relative;height:200px;"><canvas id="ann-balanceChart"></canvas></div><div class="legend" id="ann-balance-legend"></div></div>'
    + '<div class="full-chart-card" style="margin-bottom:14px;"><div class="chart-title">Spend by category · month</div><div class="cat-monthly-table-wrap">'+catTableHTML+'</div></div>'
    + '<div class="section-hdr">Monthly summary</div>'
    + '<div class="annual-months-row">'+monthCardsHTML+'</div>'
    + '</div>';
}

function renderAnnualCharts() {
  var sorted = monthOrder.slice().sort();
  var allExp = [];
  sorted.forEach(function(k){ allExp = allExp.concat((monthData[k]||{expenses:[]}).expenses); });

  destroyChart('ann-split'); destroyChart('ann-share'); destroyChart('ann-month'); destroyChart('ann-balance');

  /* ── MONTHLY SPEND BAR CHART ─────────────────────────────── */
  var mc3 = document.getElementById('ann-monthChart');
  if(mc3 && sorted.length) {
    var mMe = sorted.map(function(k){ var ex=(monthData[k]||{expenses:[]}).expenses; return Math.round(ex.reduce(function(a,e){return a+calcShare(e);},0)); });
    var mPart = sorted.map(function(k){ var ex=(monthData[k]||{expenses:[]}).expenses; var tot=ex.reduce(function(a,e){return a+e.amount;},0); var ms=ex.reduce(function(a,e){return a+calcShare(e);},0); return Math.round(tot-ms); });
    _charts['ann-month'] = new Chart(mc3,{
      type:'bar',
      data:{labels:sorted.map(fmtKey), datasets:[
        {label:nm(), data:mMe, backgroundColor:'rgba(96,144,192,0.7)', borderRadius:4, borderWidth:0},
        {label:np(), data:mPart, backgroundColor:'rgba(212,168,83,0.7)', borderRadius:4, borderWidth:0}
      ]},
      options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
        scales:{x:{stacked:true, ticks:{color:'#888070',font:{size:11}}, grid:{display:false}},
                y:{stacked:true, ticks:{callback:function(v){return '₹'+Math.round(v/1000)+'k';},color:'#888070',font:{size:10}}, grid:{color:'rgba(255,245,200,0.05)'}}}}
    });
    var leg3 = document.getElementById('ann-month-legend');
    if(leg3) leg3.innerHTML = '<div class="legend-item"><div class="legend-dot" style="background:rgba(96,144,192,0.7)"></div>'+nm()+'\'s share</div><div class="legend-item"><div class="legend-dot" style="background:rgba(212,168,83,0.7)"></div>'+np()+'\'s share</div>';
  }

  /* ── RUNNING BALANCE LINE CHART ──────────────────────────── */
  var balCanvas = document.getElementById('ann-balanceChart');
  if(balCanvas && sorted.length) {
    // netDue > 0 = partner owes me; netDue < 0 = I owe partner
    var balData = sorted.map(function(k){ return Math.round(computeFullMonth(k).netDue); });
    var balColors = balData.map(function(v){ return v > 0 ? 'rgba(90,184,154,0.9)' : v < 0 ? 'rgba(196,112,106,0.9)' : 'rgba(212,168,83,0.7)'; });
    _charts['ann-balance'] = new Chart(balCanvas, {
      type: 'line',
      data: {
        labels: sorted.map(fmtKey),
        datasets: [{
          label: 'Net balance',
          data: balData,
          borderColor: 'rgba(212,168,83,0.8)',
          backgroundColor: 'rgba(212,168,83,0.06)',
          borderWidth: 2,
          pointBackgroundColor: balColors,
          pointBorderColor: balColors,
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: function(c) {
            var v = c.raw;
            if(Math.abs(v) < 0.5) return ' Settled ✓';
            return v > 0 ? ' '+np()+' owes '+fmt(v) : ' '+nm()+' owes '+fmt(Math.abs(v));
          }}}
        },
        scales: {
          x: { ticks:{color:'#888070',font:{size:11}}, grid:{display:false} },
          y: {
            ticks: { callback: function(v){ return '₹'+Math.round(v/1000)+'k'; }, color:'#888070', font:{size:10} },
            grid: { color:'rgba(255,245,200,0.05)' },
            afterDataLimits: function(axis){ var r=Math.max(Math.abs(axis.min),Math.abs(axis.max),500); axis.min=-r*1.2; axis.max=r*1.2; }
          }
        }
      }
    });
    var balLeg = document.getElementById('ann-balance-legend');
    if(balLeg) balLeg.innerHTML = '<div class="legend-item"><div class="legend-dot" style="background:rgba(90,184,154,0.9)"></div>'+np()+' owes</div><div class="legend-item"><div class="legend-dot" style="background:rgba(196,112,106,0.9)"></div>'+nm()+' owes</div><div class="legend-item" style="font-size:11px;color:var(--muted);">Point above zero line = '+np()+' owes · below = '+nm()+' owes</div>';
  }
}

/* ════════════════════════════════════════════════════
   MONTHLY SHEET HTML
════════════════════════════════════════════════════ */
function buildMonthHTML(key) {
  var m = getMonth(key);
  var fm = computeFullMonth(key);
  var n1 = nm(), n2 = np();

  // Clamp for display only — overpayment shows as Settled, excess rolls into carry-forward
  // Raw fm.netDue is untouched so computeCarryInto remains correct.
  // Rule A: standard overpayment clamp — settlement exceeded what was owed, clamp to 0.
  var displayNetDue = fm.netDue;
  if (fm.grossDues >= 0) displayNetDue = Math.max(fm.netDue, 0);
  else displayNetDue = Math.min(fm.netDue, 0);
  // Rule B: carry-in absorption — if carryIn credit generates the apparent dues
  //         (no expenses this month, or carryIn flipped direction vs baseDues),
  //         it's surplus carry rolling forward, not a new settlement demand.
  if (Math.abs(fm.carryIn) > 0.5) {
    if (Math.abs(fm.baseDues) < 0.5) {
      displayNetDue = 0; // zero expenses — any "due" is purely carry-in
    } else if (Math.sign(fm.grossDues) !== Math.sign(fm.baseDues)) {
      displayNetDue = 0; // carryIn flipped the direction — surplus carry
    }
  }

  // Banner
  var bCls, bHead, bSub, bAmt, quickBtn='';
  // Detect "brought forward" state: carryIn credit absorbed/covered this month,
  // displayNetDue was clamped to 0 via Rule B (carry-in absorption).
  var bannerBroughtFwd = Math.abs(fm.carryIn) > 0.5 && Math.abs(displayNetDue) < 0.5
                         && (Math.abs(fm.baseDues) < 0.5 || Math.sign(fm.grossDues) !== Math.sign(fm.baseDues));
  if(displayNetDue > 0.5) {
    bCls='owe-me'; bHead=n2+' owes you'; bSub='After all adjustments, '+n2+' still needs to pay you.';
    bAmt='<div class="settle-amount pos">'+fmt(displayNetDue)+'</div>';
    quickBtn='<button class="quick-settle-btn" onclick="quickSettle(\''+key+'\',\'partner\','+displayNetDue+')">Mark as Settled ✓</button>';
  } else if(displayNetDue < -0.5) {
    bCls='owe-partner'; bHead='You owe '+n2; bSub='After all adjustments, you still need to pay.';
    bAmt='<div class="settle-amount neg">'+fmt(-displayNetDue)+'</div>';
    quickBtn='<button class="quick-settle-btn" onclick="quickSettle(\''+key+'\',\'me\','+(-displayNetDue)+')">Mark as Settled ✓</button>';
  } else if(bannerBroughtFwd) {
    var bfCredit = Math.abs(fm.carryIn);
    bCls='settled'; bHead='Advance brought forward';
    bSub='Prior credit of '+fmt(bfCredit)+' applied — no new settlement needed this month.';
    bAmt='<div class="settle-amount" style="font-size:30px;color:var(--accent)">✓</div>';
  } else {
    bCls='settled'; bHead='All settled!'; bSub='No outstanding balance for this month.';
    bAmt='<div class="settle-amount" style="font-size:30px;color:var(--accent)">✓</div>';
  }

  // Advance carried forward note (combines explicit advances + prior overpayments)
  var carryNote = '';
  if(Math.abs(fm.carryIn) > 0.5) {
    carryNote = '<div class="carry-fwd-note"><strong>Advance carried forward:</strong> '
      + (fm.carryIn > 0
        ? n2+' has a net credit of <strong>'+fmt(fm.carryIn)+'</strong> from prior months — applied to reduce their dues this month.'
        : 'You have a net credit of <strong>'+fmt(-fm.carryIn)+'</strong> from prior months — applied to reduce your dues this month.')
      + '</div>';
  }

  // Filter expenses
  var exps = m.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(_searchQuery) {
    var q = _searchQuery.toLowerCase();
    exps = exps.filter(function(e){ return e.desc.toLowerCase().indexOf(q)!==-1 || e.cat.toLowerCase().indexOf(q)!==-1; });
  }

  // Expense table
  var tableBody = '';
  if(exps.length) {
    var runningBase = 0;
    var totalRows = exps.length;
    exps.forEach(function(e, i) {
      var myS = calcShare(e);
      runningBase += (e.paidBy === 'me' ? e.amount : 0) - myS;
      // Running balance: expenses minus carry-in and advances already paid this month
      var runningSettle = runningBase - fm.carryIn - fm.netAdv;
      var isLastRow = (i === totalRows - 1);
      var isMonthSettled = Math.abs(displayNetDue) < 0.5;
      var settleCls = Math.abs(runningSettle) < 0.5 ? 'zero' : runningSettle > 0 ? 'pos' : 'neg';
      var settleLabel;
      if (Math.abs(runningSettle) < 0.5) {
        settleLabel = isLastRow && isMonthSettled ? 'Settled ✓' : '—';
      } else {
        var runStr = (runningSettle > 0 ? n2 + ' owes ' : 'You owe ') + fmt(Math.abs(runningSettle));
        settleLabel = isLastRow && isMonthSettled
          ? runStr + ' <span style="font-size:10px;opacity:0.6;">Settled ✓</span>'
          : runStr;
      }
      var splitLabel = e.split==='equal'?'50/50':e.split==='me'?'100% mine':e.split==='partner'?'100% theirs':(e.myShare+'%/'+(100-e.myShare)+'%');
      var pb = e.paidBy==='me'?('<span class="badge badge-me">'+n1+'</span>'):('<span class="badge badge-partner">'+n2+'</span>');
      tableBody += '<div class="table-row" data-key="'+key+'" data-id="'+e.id+'" style="animation-delay:'+i*0.02+'s">'
        + '<div class="swipe-delete-bg">🗑</div>'
        + '<span class="row-desc">'+escHtml(e.desc)+'</span>'
        + '<span class="row-amount">'+fmt(e.amount)+'</span>'
        + '<span>'+pb+'</span>'
        + '<span><span class="badge badge-split">'+splitLabel+'</span></span>'
        + '<span class="row-cat">'+e.cat+'</span>'
        + '<span class="row-date">'+fmtDate(e.date)+'</span>'
        + '<span class="row-share">'+fmt(myS)+'</span>'
        + '<span class="row-settle '+settleCls+'" title="Cumulative settlement due up to this entry">'+settleLabel+'</span>'
        + '<span class="row-actions">'
        + '<button class="edit-btn" onclick="openEditExpense(\''+key+'\','+e.id+')" title="Edit">✎</button>'
        + '<button class="del-btn" onclick="deleteExp(\''+key+'\','+e.id+')" title="Delete">✕</button>'
        + '</span>'
        + '</div>';
    });
  } else {
    var emptyMsg = _searchQuery ? 'No results for "'+escHtml(_searchQuery)+'"' : 'No expenses yet. Add your first one!';
    tableBody = '<div class="empty-state"><div class="big">📋</div>'+emptyMsg+'</div>';
  }

  // Lists
  function payList(items, delFn, editFn) {
    if(!items.length) return '<div style="font-size:12px;color:var(--muted);padding:8px 0;">No records yet</div>';
    return items.map(function(p){
      return '<div class="payment-row">'
        + '<span class="payment-desc"><span class="badge '+(p.paidBy==='me'?'badge-me':'badge-partner')+'">'+(p.paidBy==='me'?n1:n2)+'</span>'+(p.note?' — '+escHtml(p.note):'')+'</span>'
        + '<span class="payment-right"><span class="payment-amt">'+fmt(p.amount)+'</span><span class="payment-meta">'+fmtDate(p.date)+'</span>'
        + '<button class="edit-btn" onclick="'+editFn+'(\''+key+'\','+p.id+')" title="Edit">✎</button>'
        + '<button class="del-btn" onclick="'+delFn+'(\''+key+'\','+p.id+')" title="Remove">✕</button></span></div>';
    }).join('');
  }

  // Breakdown — narrative style
  function bRow(lbl, val, valCls, dimmed) {
    return '<div class="breakdown-row'+(dimmed?' breakdown-row-sub':'')+'"><span>'+lbl+'</span><span class="breakdown-val '+(valCls||'')+'">'+val+'</span></div>';
  }
  function bDivider() {
    return '<div style="border-top:1px solid var(--border2);margin:6px 0;"></div>';
  }

  // Step 1: base dues from expenses alone
  var breakdown = bRow(
    'Base dues (from expenses)',
    fm.baseDues >= 0 ? fmt(fm.baseDues) + ' (' + n2 + ' owes you)' : fmt(-fm.baseDues) + ' (you owe ' + n2 + ')'
  );

  // Step 2: carry-in from prior months (if any)
  if (Math.abs(fm.carryIn) > 0.5) {
    breakdown += bRow(
      'Carry-forward from prior months',
      fm.carryIn >= 0 ? '− ' + fmt(fm.carryIn) + ' (' + n2 + '\'s credit)' : '+ ' + fmt(-fm.carryIn) + ' (your credit)',
      '', true
    );
    // When carryIn flips the sign vs baseDues, label it as "credit surplus" not a new liability
    var grossLabel;
    if (Math.abs(fm.grossDues) < 0.5) {
      grossLabel = 'Credit fully absorbed ✓';
    } else if (Math.sign(fm.grossDues) !== Math.sign(fm.baseDues) || Math.abs(fm.baseDues) < 0.5) {
      // grossDues direction is driven by carryIn, not actual expenses
      grossLabel = fmt(Math.abs(fm.grossDues)) + ' (prior credit surplus — carries forward)';
    } else if (fm.grossDues > 0) {
      grossLabel = fmt(fm.grossDues) + ' (' + n2 + ' owes you)';
    } else {
      grossLabel = fmt(-fm.grossDues) + ' (you owe ' + n2 + ')';
    }
    breakdown += bRow('Gross due this month', grossLabel);
  }

  // Step 3: advances paid this month — these ADD to the liability of the recipient
  // e.g. if partner paid advance, you owe them more → increases your liability
  if (Math.abs(fm.netAdv) > 0.5) {
    // advP = advance paid by partner (Shail), advM = advance paid by me (Vidhi)
    // Each advance paid by partner adds to what you owe them
    // Each advance paid by me adds to what they owe me
    m.advancePaid.forEach(function(p) {
      var paidByPartner = p.paidBy === 'partner';
      breakdown += bRow(
        'Advance paid by ' + (paidByPartner ? n2 : n1) + (p.note ? ' (' + escHtml(p.note) + ')' : ''),
        paidByPartner ? '+ ' + fmt(p.amount) + ' (added to your liability)' : '− ' + fmt(p.amount) + ' (reduces ' + n2 + '\'s liability)',
        '', true
      );
    });
  }

  // Step 4: total owed (the number that matches the last row of the expense table)
  var totalOwed = fm.grossDues - fm.netAdv; // what you owe before any settlement
  breakdown += bDivider();
  // If grossDues direction is purely carry-in (not actual expenses), label accordingly
  var totalOwedIsPureCarry = Math.abs(fm.carryIn) > 0.5
    && (Math.abs(fm.baseDues) < 0.5 || Math.sign(fm.grossDues) !== Math.sign(fm.baseDues));
  var totalOwedLabel;
  if (Math.abs(totalOwed) < 0.5) {
    totalOwedLabel = 'Settled ✓';
  } else if (totalOwedIsPureCarry) {
    totalOwedLabel = fmt(Math.abs(totalOwed)) + ' (prior credit — carries forward)';
  } else {
    totalOwedLabel = totalOwed >= 0 ? fmt(totalOwed) + ' (' + n2 + ' owes you)' : fmt(-totalOwed) + ' (you owe ' + n2 + ')';
  }
  breakdown += bRow(
    'Total you owed ' + n2 + ' (matches last table row)',
    totalOwedLabel,
    Math.abs(totalOwed) < 0.5 ? '' : totalOwed >= 0 ? 'pos' : 'neg'
  );

  // Step 5: settlement payments
  if (Math.abs(fm.netSett) > 0.5) {
    m.settlementPaid.forEach(function(p) {
      var paidByMe = p.paidBy === 'me';
      breakdown += bRow(
        'Settlement paid by ' + (paidByMe ? n1 : n2) + (p.note ? ' — ' + escHtml(p.note) : ''),
        paidByMe ? '− ' + fmt(p.amount) : '+ ' + fmt(p.amount),
        '', true
      );
    });
  }

  // Step 6: overpayment carry-forward (if any)
  var overpay = -(fm.netDue); // positive = you overpaid, negative = partner overpaid
  if (fm.grossDues < 0) overpay = fm.netDue; // if you owed, flip
  var hasOverpay = Math.abs(fm.netDue) > 0.5 && Math.sign(fm.netDue) !== Math.sign(fm.grossDues - fm.netAdv) && Math.abs(fm.grossDues - fm.netAdv) > 0.5;
  if (hasOverpay) {
    var overAmt = Math.abs(fm.netDue);
    var totalOwedBeforeSett = fm.grossDues - fm.netAdv;
    // If you owed (totalOwed < 0) and netDue flipped positive → Vidhi (n1) overpaid
    // If partner owed (totalOwed > 0) and netDue flipped negative → Vidhi (n1) overpaid
    var overHolder = (totalOwedBeforeSett < 0) ? (fm.netDue > 0 ? n1 : n2) : (fm.netDue < 0 ? n1 : n2);
    breakdown += bRow(
      overHolder + ' overpaid — carries forward to next month',
      fmt(overAmt) + ' →',
      'pos', true
    );
  }

  // Step 7: net remaining
  breakdown += bDivider();
  var remVal = Math.abs(displayNetDue) < 0.5 ? 'Settled ✓' : fmt(Math.abs(displayNetDue));
  var remCls = displayNetDue > 0.5 ? 'pos' : displayNetDue < -0.5 ? 'neg' : 'pos';
  breakdown += '<div class="breakdown-row"><span style="color:var(--cream2);font-weight:600;">Net remaining</span><span class="breakdown-val ' + remCls + '" style="font-size:15px;">' + remVal + '</span></div>';

  var netValClass = displayNetDue > 0.5 ? 'pos' : displayNetDue < -0.5 ? 'neg' : '';

  return '<div class="page-header">'
    + '<div><h1 class="page-title">'+MONTH_NAMES[keyMonth(key)]+' <em>'+keyYear(key)+'</em></h1><p class="page-subtitle">Monthly expense sheet</p></div>'
    + '<div class="header-actions">'
    + '<span class="kbd-hint" title="Keyboard shortcut">N</span>'
    + '<button class="add-btn-main" onclick="openExpenseModal(\''+key+'\')"><span style="font-size:17px;line-height:1;">+</span> Add expense</button>'
    + '</div>'
    + '</div>'

    // SEARCH
    + '<div class="search-bar-wrap"><input class="search-bar" id="main-search" placeholder="🔍  Search expenses by description or category…" oninput="onSearch(this.value)" value="'+escHtml(_searchQuery)+'"></div>'

    + '<div class="page-content">'
    + '<div class="metrics-row">'
    + mc('c-gold','Total expenses',fmt(fm.total),m.expenses.length+' transactions')
    + mc('c-blue',n1+' paid',fmt(fm.mePaid),'Share: '+fmt(fm.myShare))
    + mc('c-teal',n2+' paid',fmt(fm.partnerPaid),'Share: '+fmt(fm.partnerShare))
    + mc2('c-rose','Net settlement due',
        fmt(Math.abs(fm.grossDues)),
        Math.abs(displayNetDue)<0.5
          ? '✓ Settled · was '+(fm.grossDues>0.5?n2+' owes':fm.grossDues<-0.5?'you owed':'zero')
          : displayNetDue>0.5?n2+' owes you':'You owe '+n2,
        Math.abs(displayNetDue)<0.5?'pos':netValClass)
    + '</div>'

    + '<div class="settle-section" style="margin-bottom:14px;"><div class="settle-section-title">Advance payments <span style="font-weight:400;font-size:10px;color:var(--muted);text-transform:none;">(carries forward to next month)</span></div>'
    + '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Any advance recorded here will automatically carry forward and reduce next month\'s settlement dues.'
    + (Math.abs(fm.carryIn)>0.5?'<br><strong style="color:var(--accent2);">'+fmt(Math.abs(fm.carryIn))+'</strong> advance carried forward from prior months is already applied above.':'')
    + '</div>'
    + '<div class="settle-input-row">'
    + '<div><div class="s-label">Paid by</div><select class="s-input" id="ap-paidby"><option value="me">'+n1+'</option><option value="partner">'+n2+'</option></select></div>'
    + '<div><div class="s-label">Amount (₹)</div><input class="s-input num-input" id="ap-amount" type="number" min="0" placeholder="0" step="0.01"></div>'
    + '<div><div class="s-label">Date</div><input class="s-input" id="ap-date" type="date" value="'+today()+'"></div>'
    + '</div>'
    + '<div><div class="s-label">Note (optional)</div><input class="s-input s-full" id="ap-note" placeholder="e.g. Paid ahead for next month"></div>'
    + '<button class="save-btn" id="ap-save-btn" onclick="saveAdvance(\''+key+'\')">Save advance</button>'
    + '<div class="payment-list">'+payList(m.advancePaid,'delAdvance','openEditAdvance')+'</div></div>'

    + '<div class="charts-row">'
    + '<div class="chart-card"><div class="chart-title">Paid by</div><div style="position:relative;height:160px;"><canvas id="m-splitChart"></canvas></div><div class="legend" id="m-split-legend"></div></div>'
    + '<div class="chart-card"><div class="chart-title">Liability split</div><div style="position:relative;height:160px;"><canvas id="m-shareChart"></canvas></div><div class="legend" id="m-share-legend"></div></div>'
    + '<div class="chart-card" style="overflow:visible;padding-right:28px;"><div class="chart-title">By category</div><div style="position:relative;height:170px;overflow:visible;"><canvas id="m-catChart" style="overflow:visible;"></canvas></div></div>'
    + '</div>'

    + '<div class="table-card" style="margin-bottom:16px;">'
    + '<div class="table-head"><span>Description</span><span>Amount</span><span>Paid by</span><span>Split</span><span>Category</span><span>Date</span><span>Your share</span><span>Settlement Due</span><span></span></div>'
    + '<div class="table-body">'+tableBody+'</div></div>'

    + '<div class="settle-banner '+bCls+'">'
    + '<div class="settle-left"><div class="settle-headline">'+bHead+'</div><div class="settle-sub">'+bSub+'</div></div>'
    + '<div class="settle-banner-right">'+bAmt+quickBtn+'</div></div>'
    + carryNote

    + '<div class="settle-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;">'

    + '<div class="settle-section"><div class="settle-section-title">Settlement breakdown</div>'+breakdown+'</div>'

    + '<div class="settle-section"><div class="settle-section-title">Record settlement payment</div>'
    + '<div class="settle-input-row">'
    + '<div><div class="s-label">Paid by</div><select class="s-input" id="sp-paidby"><option value="me">'+n1+'</option><option value="partner">'+n2+'</option></select></div>'
    + '<div><div class="s-label">Amount (₹)</div><input class="s-input num-input" id="sp-amount" type="number" min="0" placeholder="0" step="0.01"></div>'
    + '<div><div class="s-label">Date</div><input class="s-input" id="sp-date" type="date" value="'+today()+'"></div>'
    + '</div>'
    + '<div><div class="s-label">Note (optional)</div><input class="s-input s-full" id="sp-note" placeholder="e.g. UPI transfer"></div>'
    + '<button class="save-btn" id="sp-save-btn" onclick="saveSettlement(\''+key+'\')">Save payment</button>'
    + '<div class="payment-list">'+payList(m.settlementPaid,'delSettlement','openEditSettlement')+'</div></div>'

    + '</div>'
    + buildMonthEndStatus(key, fm, displayNetDue, n1, n2)
    + '</div>';
}

function buildMonthEndStatus(key, fm, displayNetDue, n1, n2) {
  // Amount by which payment exceeded the actual dues (only non-zero on overpayment)
  var overpayment = Math.abs(fm.netDue - displayNetDue);
  var hasOverpay = overpayment > 0.5;

  // Find the next month in the sequence for labelling carry-forward
  var sorted = monthOrder.slice().sort();
  var idx = sorted.indexOf(key);
  var nextKey = (idx !== -1 && idx < sorted.length - 1) ? sorted[idx + 1] : null;
  var nextLabel = nextKey ? fmtKeyFull(nextKey) : 'next month';

  // Who holds the carry-forward credit (whoever overpaid)
  var creditHolder = (fm.baseDues >= 0) ? n2 : n1;

  // Detect "brought forward" state: carryIn credit zeroed out this month's dues
  // (no actual settlement payment needed — the credit does the work)
  var hasBroughtForward = Math.abs(fm.carryIn) > 0.5 && Math.abs(displayNetDue) < 0.5
    && (Math.abs(fm.baseDues) < 0.5 || Math.sign(fm.grossDues) !== Math.sign(fm.baseDues));
  // Remaining carry-in credit after absorbing this month's baseDues
  var remainingCarry = Math.abs(fm.netDue); // raw netDue still holds the true surplus

  var panelHtml;

  if (displayNetDue > 0.5) {
    // ── State 1: Settlement still due (partner owes me) ────
    panelHtml = '<div class="month-end-status mes-due">'
      + '<div class="mes-left">'
      + '<div class="mes-tag due">● Settlement Due</div>'
      + '<div class="mes-headline">'+n2+' owes '+n1+'</div>'
      + '<div class="mes-sub">Outstanding balance to be paid this month</div>'
      + '</div>'
      + '<div class="mes-right">'
      + '<div class="mes-amount due">'+fmt(displayNetDue)+'</div>'
      + '<div class="mes-amount-label">amount due</div>'
      + '</div>'
      + '</div>';

  } else if (displayNetDue < -0.5) {
    // ── State 1b: You owe partner ──────────────────────────
    panelHtml = '<div class="month-end-status mes-due">'
      + '<div class="mes-left">'
      + '<div class="mes-tag due">● Settlement Due</div>'
      + '<div class="mes-headline">'+n1+' owes '+n2+'</div>'
      + '<div class="mes-sub">Outstanding balance to be paid this month</div>'
      + '</div>'
      + '<div class="mes-right">'
      + '<div class="mes-amount due">'+fmt(-displayNetDue)+'</div>'
      + '<div class="mes-amount-label">amount due</div>'
      + '</div>'
      + '</div>';

  } else if (hasBroughtForward) {
    // ── State 2b: Advance brought forward covered this month ─
    // Determine who holds the remaining credit after absorbing this month
    var bfCreditHolder = (fm.carryIn > 0) ? n2 : n1;
    var bfRemaining = Math.abs(fm.netDue); // surplus credit still in play
    var bfMsg = bfRemaining > 0.5
      ? 'Credit of ' + fmt(bfRemaining) + ' carries forward to ' + nextLabel
      : 'Credit fully absorbed by this month\'s expenses';
    panelHtml = '<div class="month-end-status mes-carry">'
      + '<div class="mes-left">'
      + '<div class="mes-tag carry">✓ Advance Brought Forward</div>'
      + '<div class="mes-headline">Prior credit covers this month</div>'
      + '<div class="mes-sub">'+bfMsg+'</div>'
      + '</div>'
      + '<div class="mes-right">'
      + (bfRemaining > 0.5
          ? '<div class="mes-amount carry">'+fmt(bfRemaining)+'</div><div class="mes-amount-label">carried forward →</div>'
          : '<div class="mes-amount settled" style="font-size:36px;">✓</div>')
      + '</div>'
      + '</div>';

  } else if (!hasOverpay) {
    // ── State 2: Cleanly settled, no excess ────────────────
    panelHtml = '<div class="month-end-status mes-settled">'
      + '<div class="mes-left">'
      + '<div class="mes-tag settled">✓ Settled</div>'
      + '<div class="mes-headline">All clear for '+fmtKeyFull(key)+'</div>'
      + '<div class="mes-sub">No outstanding balance — nothing carries forward</div>'
      + '</div>'
      + '<div class="mes-right">'
      + '<div class="mes-amount settled" style="font-size:36px;">✓</div>'
      + '</div>'
      + '</div>';

  } else {
    // ── State 3: Settled via overpayment, excess carries forward
    panelHtml = '<div class="month-end-status mes-carry">'
      + '<div class="mes-left">'
      + '<div class="mes-tag carry">✓ Settled — Advance Carried Forward</div>'
      + '<div class="mes-headline">'+creditHolder+' has a credit of '+fmt(overpayment)+'</div>'
      + '<div class="mes-sub">Overpayment will reduce '+creditHolder+'\'s dues in '+nextLabel+'</div>'
      + '</div>'
      + '<div class="mes-right">'
      + '<div class="mes-amount carry">'+fmt(overpayment)+'</div>'
      + '<div class="mes-amount-label">carried forward →</div>'
      + '</div>'
      + '</div>';
  }

  return panelHtml;
}

function renderMonthCharts(key) {
  var m = getMonth(key);
  var exps = m.expenses;
  var n1 = nm(), n2 = np();
  var mePaid = exps.filter(function(e){return e.paidBy==='me';}).reduce(function(a,e){return a+e.amount;},0);
  var partnerPaid = exps.filter(function(e){return e.paidBy==='partner';}).reduce(function(a,e){return a+e.amount;},0);
  var total = mePaid + partnerPaid;
  var myShare = exps.reduce(function(a,e){return a+calcShare(e);},0);
  var partnerShare = total - myShare;
  destroyChart('m-split'); destroyChart('m-share'); destroyChart('m-cat');
  var c1 = makeDoughnut('m-splitChart',[n1,n2],[Math.round(mePaid),Math.round(partnerPaid)],['#6090c0','#d4a853']);
  if(c1) _charts['m-split'] = c1;
  var l1 = document.getElementById('m-split-legend');
  if(l1) l1.innerHTML = '<div class="legend-item"><div class="legend-dot" style="background:#6090c0"></div>'+n1+' '+pct(mePaid,total)+'%</div><div class="legend-item"><div class="legend-dot" style="background:#d4a853"></div>'+n2+' '+pct(partnerPaid,total)+'%</div>';
  var c2 = makeDoughnut('m-shareChart',[n1,n2],[Math.round(myShare),Math.round(partnerShare)],['#6090c0','#d4a853']);
  if(c2) _charts['m-share'] = c2;
  var l2 = document.getElementById('m-share-legend');
  if(l2) l2.innerHTML = '<div class="legend-item"><div class="legend-dot" style="background:#6090c0"></div>'+n1+' '+pct(myShare,total)+'%</div><div class="legend-item"><div class="legend-dot" style="background:#d4a853"></div>'+n2+' '+pct(partnerShare,total)+'%</div>';
  var cc = document.getElementById('m-catChart');
  if(cc) {
    var cats={};
    exps.forEach(function(e){ cats[e.cat]=(cats[e.cat]||0)+e.amount; });
    var catKeys=Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];});
    _charts['m-cat'] = new Chart(cc,{
      type:'bar',
      data:{labels:catKeys,datasets:[{data:catKeys.map(function(k){return Math.round(cats[k]);}),backgroundColor:'rgba(90,184,154,0.5)',borderColor:'rgba(90,184,154,0.8)',borderWidth:1,borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        layout:{padding:{right:32,left:4,top:4,bottom:4}},
        scales:{x:{ticks:{callback:function(v){return '₹'+Math.round(v/1000)+'k';},color:'#888070',font:{size:10},maxRotation:0,maxTicksLimit:5},grid:{color:'rgba(255,245,200,0.05)'},border:{display:false}},
                y:{ticks:{color:'#b0a888',font:{size:10}},grid:{display:false},border:{display:false}}}}
    });
  }
}

/* ════════════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════════════ */
function onSearch(val) {
  _searchQuery = val;
  // Only re-render table section, not charts
  var key = activeView;
  if(key === 'annual') return;
  var m = getMonth(key);
  var fm = computeFullMonth(key);
  var n1=nm(),n2=np();
  var exps = m.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});
  if(_searchQuery) {
    var q = _searchQuery.toLowerCase();
    exps = exps.filter(function(e){ return e.desc.toLowerCase().indexOf(q)!==-1 || e.cat.toLowerCase().indexOf(q)!==-1; });
  }
  var tableBody = '';
  if(exps.length) {
    var runningBase = 0;
    var totalRows = exps.length;
    exps.forEach(function(e,i){
      var myS=calcShare(e);
      runningBase += (e.paidBy === 'me' ? e.amount : 0) - myS;
      var runningSettle = runningBase - fm.carryIn - fm.netAdv;
      var isLastRow = (i === totalRows - 1);
      var isMonthSettled = Math.abs(fm.netDue) < 0.5;
      var settleCls = Math.abs(runningSettle) < 0.5 ? 'zero' : runningSettle > 0 ? 'pos' : 'neg';
      var settleLabel;
      if (Math.abs(runningSettle) < 0.5) {
        settleLabel = isLastRow && isMonthSettled ? 'Settled ✓' : '—';
      } else {
        var runStr = (runningSettle > 0 ? n2 + ' owes ' : 'You owe ') + fmt(Math.abs(runningSettle));
        settleLabel = isLastRow && isMonthSettled
          ? runStr + ' <span style="font-size:10px;opacity:0.6;">Settled ✓</span>'
          : runStr;
      }
      var splitLabel=e.split==='equal'?'50/50':e.split==='me'?'100% mine':e.split==='partner'?'100% theirs':(e.myShare+'%/'+(100-e.myShare)+'%');
      var pb=e.paidBy==='me'?('<span class="badge badge-me">'+n1+'</span>'):('<span class="badge badge-partner">'+n2+'</span>');
      tableBody+='<div class="table-row" style="animation-delay:'+i*0.02+'s">'
        +'<span class="row-desc">'+escHtml(e.desc)+'</span>'
        +'<span class="row-amount">'+fmt(e.amount)+'</span>'
        +'<span>'+pb+'</span>'
        +'<span><span class="badge badge-split">'+splitLabel+'</span></span>'
        +'<span class="row-cat">'+e.cat+'</span>'
        +'<span class="row-date">'+fmtDate(e.date)+'</span>'
        +'<span class="row-share">'+fmt(myS)+'</span>'
        +'<span class="row-settle '+settleCls+'" title="Cumulative settlement due up to this entry">'+settleLabel+'</span>'
        +'<span class="row-actions">'
        +'<button class="edit-btn" onclick="openEditExpense(\''+key+'\','+e.id+')" title="Edit">✎</button>'
        +'<button class="del-btn" onclick="deleteExp(\''+key+'\','+e.id+')" title="Delete">✕</button>'
        +'</span></div>';
    });
  } else {
    tableBody='<div class="empty-state"><div class="big">🔍</div>No results for "'+escHtml(_searchQuery)+'"</div>';
  }
  var tb = document.querySelector('.table-body');
  if(tb) tb.innerHTML = tableBody;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

   EXPENSE CRUD
════════════════════════════════════════════════════ */
function openExpenseModal(key) {
  _expModalKey = key;
  _editExpId = null;
  document.getElementById('modal-expense-title').textContent = 'New expense';
  document.getElementById('btn-expense-save').textContent = 'Save expense';
  document.getElementById('f-date').value = today();
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-split').value = 'equal';
  document.getElementById('f-paidby').value = 'me';
  document.getElementById('f-cat').value = 'Groceries';
  document.getElementById('custom-row').style.display = 'none';
  openModal('modal-expense');
  setTimeout(function(){ document.getElementById('f-desc').focus(); }, 100);
}

function openEditExpense(key, id) {
  var m = getMonth(key);
  var e = m.expenses.find(function(x){ return x.id === id; });
  if(!e) return;
  _expModalKey = key;
  _editExpId = id;
  document.getElementById('modal-expense-title').textContent = 'Edit expense';
  document.getElementById('btn-expense-save').textContent = 'Update expense';
  document.getElementById('f-date').value = e.date;
  document.getElementById('f-desc').value = e.desc;
  document.getElementById('f-amount').value = e.amount;
  document.getElementById('f-split').value = e.split;
  document.getElementById('f-paidby').value = e.paidBy;
  document.getElementById('f-cat').value = e.cat;
  document.getElementById('f-myshare').value = e.myShare || 50;
  document.getElementById('custom-row').style.display = e.split==='custom' ? 'block' : 'none';
  openModal('modal-expense');
  setTimeout(function(){ document.getElementById('f-desc').focus(); }, 100);
}

function toggleCustomSplit() {
  document.getElementById('custom-row').style.display =
    document.getElementById('f-split').value === 'custom' ? 'block' : 'none';
}

function submitExpense() {
  var desc = document.getElementById('f-desc').value.trim();
  var amount = parseFloat(document.getElementById('f-amount').value);
  if(!desc || !amount || amount <= 0) { toast('⚠ Please enter a valid description and amount', 'error'); return; }
  var split = document.getElementById('f-split').value;
  var myShare = split==='equal'?50:split==='me'?100:split==='partner'?0:parseInt(document.getElementById('f-myshare').value)||50;
  var entry = {
    id: _editExpId !== null ? _editExpId : uid(),
    desc:desc, amount:amount,
    paidBy:document.getElementById('f-paidby').value,
    split:split, myShare:myShare,
    cat:document.getElementById('f-cat').value,
    date:document.getElementById('f-date').value
  };
  var m = getMonth(_expModalKey);
  if(_editExpId !== null) {
    m.expenses = m.expenses.map(function(e){ return e.id === _editExpId ? entry : e; });
    toast('✎ Expense updated', 'success');
  } else {
    m.expenses.push(entry);
    toast('✓ Expense added', 'success');
  }
  closeModal('modal-expense');
  saveState();
  renderSidebar();
  renderMain();
}

function deleteExp(key, id) {
  if(!confirm('Delete this expense?')) return;
  getMonth(key).expenses = getMonth(key).expenses.filter(function(e){return e.id!==id;});
  saveState();
  renderSidebar();
  renderMain();
  toast('🗑 Expense deleted', 'info');
}

/* ════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
════════════════════════════════════════════════════ */
document.addEventListener('keydown', function(e) {
  // Escape → close any open modal
  if(e.key === 'Escape') {
    ['modal-expense','modal-month'].forEach(function(id){ closeModal(id); });
    return;
  }
  // Ignore shortcuts when typing in inputs
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  // N → new expense (only on month view)
  if(e.key === 'n' || e.key === 'N') {
    if(activeView !== 'annual') { e.preventDefault(); openExpenseModal(activeView); }
  }
  // A → annual view
  if(e.key === 'a' || e.key === 'A') { e.preventDefault(); setView('annual'); }
  // / → focus search
  if(e.key === '/') {
    e.preventDefault();
    var sb = document.getElementById('main-search');
    if(sb) sb.focus();
  }
});

// Close modal on backdrop click
document.querySelectorAll('.modal-bg').forEach(function(bg) {
  bg.addEventListener('click', function(e) {
    if(e.target === bg) bg.classList.remove('open');
  });
});

/* ════════════════════════════════════════════════════
   THEME TOGGLE (#6)
════════════════════════════════════════════════════ */
function toggleTheme() {
  var isLight = document.body.classList.toggle('light-mode');
  try { localStorage.setItem('hh_theme', isLight ? 'light' : 'dark'); } catch(e){}
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = isLight ? '☀️' : '🌙';
}
function applyTheme() {
  try {
    var saved = localStorage.getItem('hh_theme');
    if (saved === 'light') {
      document.body.classList.add('light-mode');
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = '☀️';
    }
  } catch(e){}
}

/* ════════════════════════════════════════════════════
   LOGOUT (#10)
════════════════════════════════════════════════════ */
function logOut() {
  if (!confirm('Log out? You will need to enter the password again on this device.')) return;
  try { localStorage.removeItem('hh_auth_v2'); } catch(e){}
  location.reload();
}

/* ════════════════════════════════════════════════════
   MOBILE SIDEBAR (#8 helper)
════════════════════════════════════════════════════ */
function toggleMobSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('mob-overlay');
  var btn = document.getElementById('mob-menu-btn');
  if (!sidebar) return;
  var opening = !sidebar.classList.contains('mob-open');
  sidebar.classList.toggle('mob-open', opening);
  document.body.classList.toggle('sidebar-open', opening);
  document.body.style.overflow = opening ? 'hidden' : '';
  if (overlay) overlay.classList.toggle('active', opening);
  if (btn) btn.textContent = opening ? '✕' : '☰';
}
function closeMobSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('mob-overlay');
  var btn = document.getElementById('mob-menu-btn');
  if (sidebar) sidebar.classList.remove('mob-open');
  document.body.classList.remove('sidebar-open');
  document.body.style.overflow = '';
  if (overlay) overlay.classList.remove('active');
  if (btn) btn.textContent = '☰';
}

/* ════════════════════════════════════════════════════
   SWIPE TO DELETE (#8)
════════════════════════════════════════════════════ */
function addSwipeListeners() {
  var rows = document.querySelectorAll('.table-row[data-id]');
  rows.forEach(function(row) {
    var startX = 0;
    var isDragging = false;
    row.addEventListener('touchstart', function(e) {
      startX = e.touches[0].clientX;
      isDragging = true;
    }, {passive:true});
    row.addEventListener('touchmove', function(e) {
      if (!isDragging) return;
      var dx = startX - e.touches[0].clientX;
      if (dx > 40) {
        row.classList.add('swiping');
      } else if (dx < 10) {
        row.classList.remove('swiping');
      }
    }, {passive:true});
    row.addEventListener('touchend', function() {
      isDragging = false;
      if (row.classList.contains('swiping')) {
        var key = row.dataset.key;
        var id = parseInt(row.dataset.id);
        row.classList.remove('swiping');
        deleteExp(key, id);
      }
    });
  });
}
