<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Finances — Household Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --bg:#1a1a14; --bg2:#22221a; --bg3:#2a2a20;
  --card:#262620; --card2:#2e2e24;
  --border:rgba(255,245,200,0.08); --border2:rgba(255,245,200,0.14);
  --cream:#f5f0dc; --cream2:#e8e0c4; --cream3:#c8c0a4;
  --muted:#888070;
  --accent:#d4a853; --accent2:#e8c070;
  --teal:#5ab89a; --rose:#c4706a; --blue:#6090c0;
  --text:#f0e8d0; --r:12px; --r2:18px;
  --num-font:'Playfair Display', serif;
}
body.light-mode {
  --bg:#f5f2ea; --bg2:#eeeadf; --bg3:#e4dfd4;
  --card:#fffdf7; --card2:#f5f0e8;
  --border:rgba(100,80,20,0.1); --border2:rgba(100,80,20,0.18);
  --cream:#2a2418; --cream2:#3a3020; --cream3:#5a5040;
  --muted:#8a7a60;
  --accent:#b8860b; --accent2:#c8960c;
  --teal:#2a8a6a; --rose:#a04040; --blue:#3a6a9a;
  --text:#2a2418;
}
body.light-mode body::before{background-image:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(180,130,20,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(40,140,100,0.06) 0%,transparent 60%);}
/* THEME TOGGLE */
#theme-toggle{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:13px;display:flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;}
#theme-toggle:hover{color:var(--cream2);background:var(--card2);}
/* LOGOUT BUTTON */
#logout-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;}
#logout-btn:hover{color:var(--rose);border-color:var(--rose);}
/* SWIPE TO DELETE */
.table-row{position:relative;overflow:hidden;}
.swipe-delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:rgba(196,112,106,0.85);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transform:translateX(100%);transition:transform .2s;border-radius:0 var(--r) var(--r) 0;}
.table-row.swiping .swipe-delete-bg{transform:translateX(0);}
/* MOBILE COLLAPSIBLE SIDEBAR */
#mob-menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:9999;background:var(--card2);border:1px solid var(--border2);border-radius:9px;width:44px;height:44px;align-items:center;justify-content:center;font-size:20px;color:var(--cream);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
/* Overlay: visual dim only, pointer-events:none so it NEVER intercepts taps */
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9997;pointer-events:none;}
#mob-overlay.active{display:block;}
@media(max-width:768px){
  #mob-menu-btn{display:flex;}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(212,168,83,0.06) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(90,184,154,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.geo-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:0.4;}
.geo-bg svg{width:100%;height:100%;}
/* When sidebar is open on mobile, suppress decorative layers so sidebar is fully opaque */
@media(max-width:768px){
  body.sidebar-open::before{ display:none; }
  body.sidebar-open .geo-bg{ display:none; }
}
.shell{position:relative;z-index:1;display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;}
.logo-area{padding:22px 22px 14px;border-bottom:1px solid var(--border);}
.logo-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--cream);line-height:1.2;}
.logo-sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.05em;}
.live-clock{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);margin-top:6px;letter-spacing:.06em;}
.names-config{padding:12px 16px;border-bottom:1px solid var(--border);}
.names-config>label{display:block;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.name-field{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.name-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;}
.av-me{background:rgba(96,144,192,0.2);color:var(--blue);}
.av-partner{background:rgba(212,168,83,0.2);color:var(--accent);}
.name-field input{flex:1;min-width:0;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.name-field input:focus{border-color:var(--accent);}
.nav{padding:8px 8px;flex:1;overflow-y:auto;}
.nav-section-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:8px 12px 4px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:1px;transition:all .18s;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover{background:var(--border);color:var(--cream2);}
.nav-item.active{background:rgba(212,168,83,0.12);color:var(--accent2);}
.nav-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;}
.nav-month-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-pill{font-size:9px;padding:2px 6px;border-radius:10px;font-family:'DM Mono',monospace;flex-shrink:0;}
.nav-pill.pos{background:rgba(90,184,154,0.12);color:var(--teal);}
.nav-pill.neg{background:rgba(196,112,106,0.12);color:var(--rose);}
.nav-pill.zero{background:rgba(212,168,83,0.12);color:var(--accent);}
.nav-del{opacity:0;font-size:11px;padding:1px 5px;border-radius:4px;background:none;border:none;color:var(--muted);cursor:pointer;transition:opacity .15s,color .15s;margin-left:4px;flex-shrink:0;}
.nav-item:hover .nav-del{opacity:1;}
.nav-del:hover{color:var(--rose);}
.add-month-btn{display:flex;align-items:center;gap:7px;width:calc(100% - 16px);margin:4px 8px;padding:7px 12px;border-radius:9px;font-size:12px;color:var(--muted);border:1px dashed var(--border2);background:none;cursor:pointer;transition:all .2s;}
.add-month-btn:hover{color:var(--accent);border-color:var(--accent);}

/* SIDEBAR BOTTOM TOOLBAR */
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);cursor:pointer;padding:6px 10px;font-size:11px;display:flex;align-items:center;gap:5px;transition:all .18s;white-space:nowrap;}
.icon-btn:hover{color:var(--cream2);border-color:var(--border2);background:var(--card2);}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;}
.page-header{padding:28px 32px 0;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.page-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--cream);line-height:1.1;}
.page-title em{font-style:italic;color:var(--accent2);}
.page-subtitle{font-size:13px;color:var(--muted);margin-top:5px;}
.header-actions{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap;align-items:center;}
.kbd-hint{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;}
.add-btn-main{background:var(--accent);color:#1a1a14;border:none;border-radius:var(--r);padding:9px 18px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;}
.add-btn-main:hover{background:var(--accent2);transform:translateY(-1px);}
.add-btn-main.secondary{background:transparent;color:var(--cream2);border:1px solid var(--border2);}
.add-btn-main.secondary:hover{background:var(--card2);transform:translateY(-1px);}
.page-content{padding:20px 32px 48px;}

/* METRICS */
.metrics-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;animation:fadeUp .4s ease both;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden;transition:transform .2s,border-color .2s;}
.metric-card:hover{transform:translateY(-2px);border-color:var(--border2);}
.metric-card::before{content:'';position:absolute;top:0;right:0;width:55px;height:55px;border-radius:0 var(--r2) 0 55px;opacity:.06;}
.metric-card.c-gold::before{background:var(--accent);}
.metric-card.c-teal::before{background:var(--teal);}
.metric-card.c-blue::before{background:var(--blue);}
.metric-card.c-rose::before{background:var(--rose);}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.metric-value{font-family:var(--num-font);font-size:22px;font-weight:600;color:var(--cream);line-height:1;}
.metric-value.pos{color:var(--teal);}
.metric-value.neg{color:var(--rose);}
.metric-sub{font-size:11px;color:var(--muted);margin-top:5px;}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:12px;margin-bottom:18px;animation:fadeUp .5s ease .05s both;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;overflow:visible;}
.chart-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.chart-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--accent);display:inline-block;}
.legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* EXPENSE TABLE */
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;animation:fadeUp .5s ease .1s both;}
.table-head{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1.2fr 0.9fr 1.2fr 1.2fr 60px;padding:10px 16px;border-bottom:1px solid var(--border);gap:7px;}
.table-head span{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.table-body{overflow-y:visible;}
.table-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 1.2fr 0.9fr 1.2fr 1.2fr 60px;padding:11px 16px;border-bottom:1px solid var(--border);gap:7px;align-items:center;transition:background .15s;animation:rowIn .3s ease both;}
.table-row:last-child{border-bottom:none;}
.table-row:hover{background:var(--card2);}
.row-desc{font-size:13px;font-weight:500;color:var(--cream2);}
.row-amount{font-family:var(--num-font);font-size:14px;color:var(--cream);}
.row-share{font-family:var(--num-font);font-size:14px;font-weight:600;color:var(--accent2);}
.row-settle{font-family:var(--num-font);font-size:13px;font-weight:600;}
.row-settle.pos{color:var(--teal);}
.row-settle.neg{color:var(--rose);}
.row-settle.zero{color:var(--muted);font-size:11px;}
.row-date{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.row-cat{font-size:11px;color:var(--muted);}
.row-actions{display:flex;gap:3px;align-items:center;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:.04em;}
.badge-me{background:rgba(96,144,192,0.15);color:#88b4e0;border:1px solid rgba(96,144,192,0.25);}
.badge-partner{background:rgba(212,168,83,0.12);color:var(--accent2);border:1px solid rgba(212,168,83,0.2);}
.badge-split{background:rgba(90,184,154,0.1);color:var(--teal);border:1px solid rgba(90,184,154,0.2);font-size:10px;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;width:26px;height:26px;border-radius:7px;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.del-btn:hover{background:rgba(196,112,106,0.15);color:var(--rose);}
.edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;width:26px;height:26px;border-radius:7px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.edit-btn:hover{background:rgba(212,168,83,0.12);color:var(--accent2);}

/* CAT TABLE */
.cat-table-wrap{overflow-x:auto;}
.cat-table{width:100%;border-collapse:collapse;font-size:12px;}
.cat-table th{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);}
.cat-table th.num,.cat-table td.num{text-align:right;}
.cat-table td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--cream2);}
.cat-table td.num{font-family:var(--num-font);font-size:13px;color:var(--cream);}
.cat-table tr:last-child td{border-bottom:none;}
.cat-table tr:hover td{background:var(--card2);}
.cat-bar-bg{height:4px;border-radius:2px;background:var(--bg3);min-width:60px;}
.cat-bar-fill{height:4px;border-radius:2px;background:var(--teal);}

/* MONTH-END STATUS PANEL */
.month-end-status{border-radius:var(--r2);padding:20px 28px;margin-top:20px;margin-bottom:8px;animation:fadeUp .4s ease both;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.month-end-status.mes-due{background:linear-gradient(135deg,rgba(196,112,106,.18) 0%,rgba(196,112,106,.06) 100%);border:1.5px solid rgba(196,112,106,.35);}
.month-end-status.mes-settled{background:linear-gradient(135deg,rgba(90,184,154,.15) 0%,rgba(90,184,154,.05) 100%);border:1.5px solid rgba(90,184,154,.3);}
.month-end-status.mes-carry{background:linear-gradient(135deg,rgba(212,168,83,.14) 0%,rgba(212,168,83,.04) 100%);border:1.5px solid rgba(212,168,83,.3);}
.mes-left{display:flex;flex-direction:column;gap:4px;}
.mes-tag{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:2px;}
.mes-tag.due{color:var(--rose);}
.mes-tag.settled{color:var(--teal);}
.mes-tag.carry{color:var(--accent);}
.mes-headline{font-family:'Playfair Display',serif;font-size:17px;color:var(--cream);line-height:1.3;}
.mes-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.mes-right{text-align:right;flex-shrink:0;}
.mes-amount{font-family:var(--num-font);font-size:32px;font-weight:600;line-height:1;}
.mes-amount.due{color:var(--rose);}
.mes-amount.settled{color:var(--teal);}
.mes-amount.carry{color:var(--accent2);}
.mes-amount-label{font-size:11px;color:var(--muted);margin-top:4px;}.settle-banner{border-radius:var(--r2);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;animation:fadeUp .4s ease both;flex-wrap:wrap;gap:12px;}
.settle-banner.owe-partner{background:linear-gradient(135deg,rgba(196,112,106,.15) 0%,rgba(196,112,106,.05) 100%);border:1px solid rgba(196,112,106,.25);}
.settle-banner.owe-me{background:linear-gradient(135deg,rgba(90,184,154,.15) 0%,rgba(90,184,154,.05) 100%);border:1px solid rgba(90,184,154,.25);}
.settle-banner.settled{background:linear-gradient(135deg,rgba(212,168,83,.1) 0%,transparent 100%);border:1px solid var(--border2);}
.settle-left .settle-headline{font-family:'Playfair Display',serif;font-size:19px;color:var(--cream);}
.settle-left .settle-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.settle-banner-right{display:flex;align-items:center;gap:14px;}
.settle-amount{font-family:var(--num-font);font-size:36px;font-weight:600;}
.settle-amount.pos{color:var(--teal);}
.settle-amount.neg{color:var(--rose);}
.quick-settle-btn{background:rgba(90,184,154,0.12);border:1px solid rgba(90,184,154,0.3);color:var(--teal);border-radius:9px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.quick-settle-btn:hover{background:rgba(90,184,154,0.22);}
.settle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;animation:fadeUp .4s ease both;}
.settle-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px 20px;margin-bottom:12px;animation:fadeUp .5s ease .1s both;overflow:visible;}
.settle-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.settle-section-title::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--accent);display:inline-block;}
.settle-input-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.s-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.s-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--cream);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.s-input:focus{border-color:var(--accent);}
.s-input.num-input{font-family:var(--num-font);font-size:14px;}
.s-input.s-full{margin-bottom:10px;}
.save-btn{padding:8px 18px;background:var(--accent);color:#1a1a14;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:background .2s;}
.save-btn:hover{background:var(--accent2);}
.payment-list{margin-top:10px;}
.payment-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px;}
.payment-row:last-child{border-bottom:none;}
.payment-desc{color:var(--cream2);flex:1;min-width:0;}
.payment-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.payment-amt{font-family:var(--num-font);font-size:14px;color:var(--accent2);}
.payment-meta{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;}
.carry-fwd-note{font-size:12px;color:var(--muted);background:rgba(212,168,83,.08);border:1px solid rgba(212,168,83,.18);border-radius:9px;padding:9px 13px;margin-bottom:12px;line-height:1.6;}
.carry-fwd-note strong{color:var(--accent2);}
.breakdown-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);}
.breakdown-row:last-child{border-bottom:none;font-weight:600;padding-top:8px;}
.breakdown-row-sub{font-size:11px;opacity:0.75;padding-left:10px;}
.breakdown-val{font-family:var(--num-font);font-size:13px;color:var(--cream);}

/* ANNUAL MONTH CARDS */
.annual-months-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:18px;animation:fadeUp .4s ease both;}

/* CATEGORY MONTHLY TABLE */
.cat-monthly-table-wrap{overflow-x:auto;margin-top:4px;}
.cat-monthly-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px;}
.cat-monthly-table th{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
.cat-monthly-table th.left{text-align:left;}
.cat-monthly-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--cream2);text-align:right;font-family:'Playfair Display',serif;font-size:12px;}

     before the async ES-module finishes auth + loading. -->
<script>
function toggleMobSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('mob-overlay');
  var btn = document.getElementById('mob-menu-btn');
  if (!sidebar) return;
  var opening = !sidebar.classList.contains('mob-open');
  sidebar.classList.toggle('mob-open', opening);
  document.body.classList.toggle('sidebar-open', opening);
  document.body.style.overflow = opening ? 'hidden' : '';
  if (overlay) overlay.classList.toggle('active', opening);
  if (btn) btn.textContent = opening ? '✕' : '☰';
}
function closeMobSidebar() {
  var sidebar = document.querySelector('.sidebar');
  var overlay = document.getElementById('mob-overlay');
  var btn = document.getElementById('mob-menu-btn');
  if (sidebar) sidebar.classList.remove('mob-open');
  document.body.classList.remove('sidebar-open');
  document.body.style.overflow = '';
  if (overlay) overlay.classList.remove('active');
  if (btn) btn.textContent = '☰';
}
function toggleTheme() {
  var isLight = document.body.classList.toggle('light-mode');
  try { localStorage.setItem('hh_theme', isLight ? 'light' : 'dark'); } catch(e){}
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = isLight ? '☀️' : '🌙';
}
function logOut() {
  if (!confirm('Log out? You will need to enter the password again on this device.')) return;
  try { localStorage.removeItem('hh_auth_v2'); } catch(e){}
  location.reload();
}
// Close sidebar when tapping outside it (on the dimmed main area)
document.addEventListener('touchstart', function(e) {
  var sidebar = document.querySelector('.sidebar');
  if (!sidebar || !sidebar.classList.contains('mob-open')) return;
  // If the tap target is inside the sidebar, do nothing
  if (sidebar.contains(e.target)) return;
  // If the tap target is the hamburger button, do nothing (its own onclick handles it)
  if (e.target.closest('#mob-menu-btn')) return;
  closeMobSidebar();
}, {passive: true});
// Apply saved theme instantly (no flash)
try {
  if (localStorage.getItem('hh_theme') === 'light') document.body.classList.add('light-mode');
} catch(e){}
</script>

var nameMe = '', namePartner = '';
var activeView = 'annual';
var _expModalKey = null;
var _editExpId = null; // null = new, otherwise editing
var _editSettKey = null, _editSettId = null; // settlement edit state
var _editAdvKey  = null, _editAdvId  = null; // advance edit state
var _nextId = 1;
var _charts = {};
var _searchQuery = '';

var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var SHORT_M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* ════════════════════════════════════════════════════
   REAL-TIME SHARED PERSISTENCE
════════════════════════════════════════════════════ */
var SHARED_KEY = 'hh_tracker_shared_v1';
var _lastSyncHash = null;
var _syncInterval = null;
var _isSyncing = false;

function stateHash(s) {
  // Quick fingerprint to detect remote changes
  return JSON.stringify({ mo: s.monthOrder, md: s.monthData, ni: s._nextId });
}

async function saveState() {
  var payload = {
    monthData: monthData, monthOrder: monthOrder, nameMe: nameMe,
    namePartner: namePartner, _nextId: _nextId, _savedAt: Date.now()
  };
  var { error } = await supabase.from(TABLE_NAME).upsert({ id: ROW_ID, finance_data: payload });
  if (!error) { setSyncStatus('saved'); _lastSyncHash = stateHash(payload); }
  else { console.warn('Supabase save error', error); setSyncStatus('error'); }
}

async function loadState() {
  var { data } = await supabase.from(TABLE_NAME).select('finance_data').eq('id', ROW_ID).single();
  if (data && data.finance_data) {
    applyState(data.finance_data);
    _lastSyncHash = stateHash(data.finance_data);
    toast('💾 Data restored', 'info');
  }
}

function applyState(s, silent) {
  monthData = s.monthData || {};
  monthOrder = s.monthOrder || [];
  nameMe = s.nameMe || '';
  namePartner = s.namePartner || '';
  _nextId = s._nextId || 1;
  document.getElementById('name-me').value = nameMe;
  document.getElementById('name-partner').value = namePartner;
  document.getElementById('av-me').textContent = nameMe ? nameMe.substring(0,2).toUpperCase() : 'ME';
  document.getElementById('av-partner').textContent = namePartner ? namePartner.substring(0,2).toUpperCase() : 'SP';
  if(activeView !== 'annual' && monthOrder.indexOf(activeView) === -1) {
    activeView = monthOrder.length ? monthOrder[monthOrder.length-1] : 'annual';
  }
}

function setupRealtime() {
  supabase.channel('db-changes').on('postgres_changes',
    { event: 'UPDATE', schema: 'public', table: TABLE_NAME },
    function(payload) {
      var newState = payload.new.finance_data;
      if (stateHash(newState) !== _lastSyncHash) {
        var prevView = activeView;
        applyState(newState);
        activeView = prevView;
        _lastSyncHash = stateHash(newState);
        renderSidebar();
        renderMain();
        toast('🔄 Updated by ' + (namePartner || 'partner'), 'info');
      }
    }).subscribe();
}

function setSyncStatus(status) {
  var dot = document.getElementById('sync-dot');
  var lbl = document.getElementById('sync-label');
  if (!dot || !lbl) return;
  var map = {
    online:  { color: 'var(--teal)',   text: 'Live' },
    saved:   { color: 'var(--accent)', text: 'Saved' },
    synced:  { color: 'var(--blue)',   text: 'Synced' },
    error:   { color: 'var(--rose)',   text: 'Offline' },
    loading: { color: 'var(--muted)',  text: 'Connecting…' }
  };
  var s = map[status] || map.online;
  dot.style.background = s.color;
  lbl.textContent = s.text;
}

/* ════════════════════════════════════════════════════
   EXPORT / IMPORT
════════════════════════════════════════════════════ */
function exportData() {
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var W = doc.internal.pageSize.getWidth();
  var sorted = monthOrder.slice().sort();
  var n1 = nm(), n2 = np();
  var exportDate = new Date().toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'});

  // ── Colour palette ──────────────────────────────────────
  var GOLD   = [212, 168, 83];
  var TEAL   = [90,  184, 154];
  var ROSE   = [196, 112, 106];
  var BLUE   = [96,  144, 192];
  var BG     = [26,  26,  20];
  var CARD   = [38,  38,  32];
  var CREAM  = [245, 240, 220];
  var MUTED  = [136, 128, 112];
  var WHITE  = [255, 255, 255];

  function setFill(rgb)   { doc.setFillColor(rgb[0], rgb[1], rgb[2]); }
  function setDraw(rgb)   { doc.setDrawColor(rgb[0], rgb[1], rgb[2]); }
  function setTxt(rgb)    { doc.setTextColor(rgb[0], rgb[1], rgb[2]); }
  function fmtAmt(n)      { return 'Rs.' + Math.round(Math.abs(n)).toLocaleString('en-IN'); }

  var y = 0; // current Y cursor

  // ── Cover header ────────────────────────────────────────
  setFill(BG);
  doc.rect(0, 0, W, 48, 'F');

  // Gold accent bar
  setFill(GOLD);
  doc.rect(0, 0, 4, 48, 'F');

  // Title
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(22);
  setTxt(CREAM);
  doc.text('Our Finances', 12, 18);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  setTxt(MUTED);
  doc.text('Household Expense Report', 12, 26);
  doc.text(n1 + '  ·  ' + n2, 12, 33);
  doc.text('Exported: ' + exportDate, 12, 40);

  // Month count badge
  setFill(GOLD);
  doc.roundedRect(W - 46, 14, 38, 10, 2, 2, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  setTxt(BG);
  doc.text(sorted.length + ' month' + (sorted.length !== 1 ? 's' : ''), W - 27, 20.5, {align:'center'});

  y = 56;

  // ── Annual summary metrics ───────────────────────────────
  var allExp = [];
  sorted.forEach(function(k){ allExp = allExp.concat((monthData[k]||{expenses:[]}).expenses); });
  var annTotal    = allExp.reduce(function(a,e){return a+e.amount;},0);
  var annMePaid   = allExp.filter(function(e){return e.paidBy==='me';}).reduce(function(a,e){return a+e.amount;},0);
  var annPrtPaid  = annTotal - annMePaid;
  var annNetDue   = sorted.length ? computeFullMonth(sorted[sorted.length-1]).netDue : 0;

  var metrics = [
    { label:'Total Expenses',    value: fmtAmt(annTotal),           color: GOLD },
    { label: n1 + ' Paid',       value: fmtAmt(annMePaid),          color: BLUE },
    { label: n2 + ' Paid',       value: fmtAmt(annPrtPaid),         color: TEAL },
    { label:'Net Balance',       value: fmtAmt(Math.abs(annNetDue)), color: annNetDue > 0.5 ? TEAL : annNetDue < -0.5 ? ROSE : GOLD }
  ];

  var boxW = (W - 20) / 4 - 3;
  metrics.forEach(function(m, i) {
    var x = 10 + i * (boxW + 4);
    setFill(CARD);
    doc.roundedRect(x, y, boxW, 22, 2, 2, 'F');
    setFill(m.color);
    doc.roundedRect(x, y, boxW, 3, 1, 1, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    setTxt(m.color);
    doc.text(m.value, x + boxW / 2, y + 14, {align:'center'});
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    setTxt(MUTED);
    doc.text(m.label, x + boxW / 2, y + 20, {align:'center'});
  });

  y += 30;

  // ── Annual net balance note ──────────────────────────────
  if(Math.abs(annNetDue) > 0.5) {
    var noteColor = annNetDue > 0 ? TEAL : ROSE;
    var noteText  = annNetDue > 0
      ? n2 + ' owes ' + n1 + ': ' + fmtAmt(annNetDue)
      : n1 + ' owes ' + n2 + ': ' + fmtAmt(-annNetDue);
    setFill(noteColor);
    doc.roundedRect(10, y, W - 20, 8, 2, 2, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    setTxt(BG);
    doc.text(noteText, W / 2, y + 5.2, {align:'center'});
    y += 14;
  }

  // ── Per-month sections ───────────────────────────────────
  sorted.forEach(function(key) {
    var m  = getMonth(key);
    var fm = computeFullMonth(key);
    var exps = m.expenses.slice().sort(function(a,b){return a.date.localeCompare(b.date);});

    // Section heading
    if(y > 240) { doc.addPage(); y = 14; }

    setFill(BG);
    doc.rect(0, y, W, 10, 'F');
    setFill(GOLD);
    doc.rect(10, y + 2, 3, 6, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    setTxt(CREAM);
    doc.text(MONTH_NAMES[keyMonth(key)] + ' ' + keyYear(key), 17, y + 7.2);

    // Month mini-metrics on the right
    var mMets = [
      { l:'Total', v:fmtAmt(fm.total) },
      { l: n1 + ' paid', v:fmtAmt(fm.mePaid) },
      { l: n2 + ' paid', v:fmtAmt(fm.partnerPaid) }
    ];
    var mx = W - 10;
    mMets.reverse().forEach(function(mm) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8);
      setTxt(GOLD);
      doc.text(mm.v, mx, y + 5, {align:'right'});
      mx -= doc.getTextWidth(mm.v) + 2;
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7);
      setTxt(MUTED);
      doc.text(mm.l + ': ', mx, y + 5, {align:'right'});
      mx -= doc.getTextWidth(mm.l + ': ') + 4;
    });

    y += 13;

    // Expense table
    if(exps.length) {
      var splitLabel = function(e) {
        if(e.split==='equal') return '50/50';
        if(e.split==='me') return '100% ' + n1;
        if(e.split==='partner') return '100% ' + n2;
        return e.myShare + '% / ' + (100-e.myShare) + '%';
      };
      var tableRows = exps.map(function(e) {
        return [
          e.desc,
          fmtAmt(e.amount),
          e.paidBy === 'me' ? n1 : n2,
          splitLabel(e),
          e.cat,
          fmtDate(e.date),
          fmtAmt(calcShare(e))
        ];
      });

      doc.autoTable({
        startY: y,
        head: [['Description','Amount','Paid by','Split','Category','Date','Your share']],
        body: tableRows,
        theme: 'plain',
        styles: {
          font: 'helvetica', fontSize: 7.5,
          cellPadding: {top:2.5, bottom:2.5, left:3, right:3},
          textColor: [220,210,195],
          fillColor: CARD,
          lineColor: [50,50,40],
          lineWidth: 0.2
        },
        headStyles: {
          fillColor: [30,30,22],
          textColor: MUTED,
          fontStyle: 'bold',
          fontSize: 7,
          lineWidth: 0
        },
        alternateRowStyles: { fillColor: [34,34,26] },
        columnStyles: {
          0: { cellWidth: 42 },
          1: { cellWidth: 22, halign:'right', textColor:CREAM },
          2: { cellWidth: 18, halign:'center' },
          3: { cellWidth: 18, halign:'center', textColor:MUTED },
          4: { cellWidth: 22 },
          5: { cellWidth: 18, halign:'center', textColor:MUTED, font:'courier' },
          6: { cellWidth: 22, halign:'right', textColor:GOLD, fontStyle:'bold' }
        },
        margin: { left:10, right:10 },
        didDrawPage: function(d) { y = d.cursor.y; }
      });

      y = doc.lastAutoTable.finalY + 4;
    } else {
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(8);
      setTxt(MUTED);
      doc.text('No expenses recorded for this month.', 13, y + 5);
      y += 10;
    }

    // Settlement summary strip
    var netDue = fm.netDue;
    var stripColor = Math.abs(netDue) < 0.5 ? TEAL : netDue > 0 ? TEAL : ROSE;
    var stripText  = Math.abs(netDue) < 0.5
      ? 'All settled ✓'
      : netDue > 0
        ? n2 + ' owes ' + n1 + ': ' + fmtAmt(netDue)
        : n1 + ' owes ' + n2 + ': ' + fmtAmt(-netDue);

    if(fm.carryIn && Math.abs(fm.carryIn) > 0.5) {
      stripText += '   (carry-in: ' + fmtAmt(fm.carryIn) + ')';
    }

    if(y > 268) { doc.addPage(); y = 14; }
    setFill(stripColor);
    doc.roundedRect(10, y, W - 20, 7, 1.5, 1.5, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    setTxt(BG);
    doc.text(stripText, W / 2, y + 4.8, {align:'center'});
    y += 12;

    // Settlement & advance records (if any)
    var hasSett = m.settlementPaid.length > 0;
    var hasAdv  = m.advancePaid.length > 0;

    if(hasSett || hasAdv) {
      if(y > 250) { doc.addPage(); y = 14; }

      var payRows = [];
      m.settlementPaid.forEach(function(p) {
        payRows.push(['Settlement', p.paidBy==='me'?n1:n2, fmtAmt(p.amount), fmtDate(p.date), p.note||'—']);
      });
      m.advancePaid.forEach(function(p) {
        payRows.push(['Advance', p.paidBy==='me'?n1:n2, fmtAmt(p.amount), fmtDate(p.date), p.note||'—']);
      });

      doc.autoTable({
        startY: y,
        head: [['Type','Paid by','Amount','Date','Note']],
        body: payRows,
        theme: 'plain',
        styles: {
          font:'helvetica', fontSize:7.5,
          cellPadding:{top:2,bottom:2,left:3,right:3},
          textColor:[200,190,170],
          fillColor:[30,30,22],
          lineColor:[45,45,35],
          lineWidth:0.2
        },
        headStyles: { fillColor:[22,22,16], textColor:MUTED, fontStyle:'bold', fontSize:7, lineWidth:0 },
        columnStyles: {
          0:{cellWidth:24, fontStyle:'bold', textColor:GOLD},
          1:{cellWidth:22, halign:'center'},
          2:{cellWidth:24, halign:'right', textColor:CREAM},
          3:{cellWidth:22, halign:'center', textColor:MUTED},
          4:{cellWidth:'auto'}
        },
        margin:{left:10, right:10}
      });

      y = doc.lastAutoTable.finalY + 8;
    }
  });

  // ── Footer on every page ─────────────────────────────────
  var totalPages = doc.internal.getNumberOfPages();
  for(var p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    var fY = doc.internal.pageSize.getHeight() - 8;
    setFill(BG);
    doc.rect(0, fY - 4, W, 14, 'F');
    setFill(GOLD);
    doc.rect(0, fY - 4, W, 0.4, 'F');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    setTxt(MUTED);
    doc.text('Our Finances — Household Tracker', 10, fY + 2);
    doc.text('Page ' + p + ' of ' + totalPages, W - 10, fY + 2, {align:'right'});
  }

  doc.save('our-finances-' + new Date().toISOString().slice(0,10) + '.pdf');
  toast('⬇ PDF exported', 'success');
}



/* ════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════ */
function toast(msg, type) {
  var container = document.getElementById('toast-container');
  var el = document.createElement('div');
  el.className = 'toast ' + (type||'info');
  el.innerHTML = '<span>' + msg + '</span>';
  container.appendChild(el);
  setTimeout(function() {
    el.classList.add('fade-out');
    setTimeout(function(){ el.remove(); }, 300);
  }, 2400);
}
